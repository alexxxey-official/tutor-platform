<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Platform — Интерактивные уроки</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
 :root {
 --ink: #1a1a2e; --paper: #faf8f3; --accent: #e63946;
 --gold: #f4a261; --teal: #2a9d8f; --muted: #6b7280;
 --card: #ffffff; --border: #e5e0d5;
 }
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.7; padding-bottom: 80px; }

 /* TOP NAVIGATION */
 .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: var(--ink); color: white; border-bottom: 1px solid rgba(255,255,255,0.1); }
 .logo { font-family: 'Bounded', 'Unbounded', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: 1px; }
 .logo span { color: var(--gold); }
 .login-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
 .login-btn:hover { background: white; color: var(--ink); }

 /* HERO SECTION */
 .header { background: var(--ink); color: white; padding: 60px 40px 80px; text-align: center; position: relative; overflow: hidden; }
 .header::before { content: '∑'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 400px; color: rgba(255,255,255,.02); font-family: 'Unbounded', sans-serif; pointer-events: none; }
 .header h1 { font-family: 'Bounded', 'Unbounded', sans-serif; font-weight: 800; font-size: clamp(32px, 5vw, 48px); margin-bottom: 10px; position: relative; z-index: 1; }
 .header p { color: rgba(255,255,255,.7); font-size: 16px; position: relative; z-index: 1; }

 /* CONTAINER & GRID */
 .container { max-width: 1000px; margin: -40px auto 0; padding: 0 24px; position: relative; z-index: 2; }
 .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }

 /* CARDS */
 .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; transition: all 0.3s ease; display: flex; flex-direction: column; text-decoration: none; color: inherit; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
 .card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); border-color: var(--teal); }

 .card-tag { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; display: inline-block; }
 .card-tag.ege { color: var(--accent); }
 .card-tag.algebra { color: var(--gold); }

 .card h2 { font-family: 'Bounded', 'Unbounded', sans-serif; font-weight: 700; font-size: 20px; margin-bottom: 8px; line-height: 1.3; }
 .card p { font-size: 14px; color: var(--muted); margin-bottom: 24px; flex-grow: 1; }

 .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 16px; margin-top: auto; }
 .status { font-size: 12px; font-weight: 600; color: var(--muted); background: #f3f4f6; padding: 4px 10px; border-radius: 20px; }
 .btn { background: var(--ink); color: white; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: background 0.2s; }
 .card:hover .btn { background: var(--teal); }
</style>
</head>
<body>

<div class="top-nav">
    <div class="logo">Math<span>Platform</span></div>
    <button class="login-btn">Войти</button>
</div>

<div class="header">
    <h1>Интерактивные уроки</h1>
    <p>Твоя персональная платформа для подготовки</p>
</div>

<div class="container">
    <div class="course-grid">
        
        <!-- Карточка твоего первого урока -->
        <a href="HM_10.1.html" class="card">
            <span class="card-tag ege">ЕГЭ ПРОФИЛЬ</span>
            <h2>Задание 10: Движение по прямой</h2>
            <p>Текстовые задачи на движение. Классная работа, теория и домашнее задание.</p>
            <div class="card-footer">
                <span class="status">Доступно</span>
                <span class="btn">Открыть урок</span>
            </div>
        </a>

        <!-- Карточка-заглушка для будущих уроков -->
        <div class="card" style="opacity: 0.6; pointer-events: none;">
            <span class="card-tag algebra">АЛГЕБРА</span>
            <h2>Алгебраические дроби</h2>
            <p>Материал находится в разработке...</p>
            <div class="card-footer">
                <span class="status">Скоро</span>
                <span class="btn" style="background: var(--muted)">Ждем</span>
            </div>
        </div>

    </div>
</div>

</body>
</html>
